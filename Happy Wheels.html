<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Wheels</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
}

#container {
  width: 100%;
  height: 100%;
}

/* Force ruffle player to fill */
ruffle-player {
  width: 100% !important;
  height: 100% !important;
  display: block;
}
</style>
</head>

<body>

<div id="container"></div>

<script src="https://cdn.jsdelivr.net/gh/linuxfandudeguy/emulationmelon@main/ruffle-0.2.0-nightly.2025.10.2/package/ruffle.js"></script>

<script>
window.addEventListener("load", () => {
  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();

  player.style.width = "100%";
  player.style.height = "100%";

  document.getElementById("container").appendChild(player);

  player.ruffle().load(
    "https://cdn.jsdelivr.net/gh/linuxfandudeguy/google-classroom@main/HappyWheels.swf"
  );
});
</script>

</body>
</html>
